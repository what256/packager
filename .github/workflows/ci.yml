name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: node --check npm/packager-cli/bin/packager.js
      - run: node scripts/check-versions.mjs
      - name: Parse Windows release and WSL2 verification scripts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          foreach ($script in @(
            "scripts/windows-wsl2-smoke.ps1",
            "scripts/verify-windows-release.ps1"
          )) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $script),
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -ne 0) {
              throw "$script failed to parse: $($errors | ForEach-Object Message | Out-String)"
            }
          }
      - name: Parse macOS release verification script
        shell: bash
        run: |
          sh -n scripts/verify-macos-release.sh
          bash -n scripts/macos-runtime-smoke.sh
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features --target ${{ matrix.target }} -- -D warnings
      - run: cargo test --workspace --target ${{ matrix.target }}
      - run: cargo run -p packager-cli --target ${{ matrix.target }} -- --help
      - name: Validate JSON contracts
        shell: bash
        run: jq empty schemas/packager.schema.json src-tauri/tauri.conf.json npm/*/package.json
