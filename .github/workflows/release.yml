name: Release Packager

on:
  push:
    tags: ["v*"]

jobs:
  desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - run: npm ci
      - name: Verify updater-signing secrets
        shell: bash
        run: |
          test -n "$TAURI_SIGNING_PRIVATE_KEY"
          test -n "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
      - name: Verify release tag matches source versions
        shell: bash
        run: node scripts/check-versions.mjs "${GITHUB_REF_NAME#v}"
      - name: Verify Apple signing and notarization secrets
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          test -n "$APPLE_CERTIFICATE"
          test -n "$APPLE_CERTIFICATE_PASSWORD"
          test -n "$KEYCHAIN_PASSWORD"
          test -n "$APPLE_ID"
          test -n "$APPLE_PASSWORD"
          test -n "$APPLE_TEAM_ID"
      - name: Import Developer ID certificate
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          CERT_ID=$(security find-identity -v -p codesigning build.keychain | sed -n 's/.*"\(Developer ID Application:[^"]*\)".*/\1/p' | head -1)
          test -n "$CERT_ID"
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
          rm certificate.p12
      - name: Verify and import Windows code-signing certificate
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE -or -not $env:WINDOWS_CERTIFICATE_PASSWORD) {
            throw "WINDOWS_CERTIFICATE and WINDOWS_CERTIFICATE_PASSWORD are required"
          }
          [IO.File]::WriteAllBytes("certificate.pfx", [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $password = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $certificate = Import-PfxCertificate -FilePath certificate.pfx -CertStoreLocation Cert:\CurrentUser\My -Password $password
          if (-not $certificate.Thumbprint) { throw "The Windows signing certificate has no thumbprint" }
          "WINDOWS_CERTIFICATE_THUMBPRINT=$($certificate.Thumbprint)" | Out-File $env:GITHUB_ENV -Append
          Remove-Item certificate.pfx
      - name: Configure release URL and Windows signing
        shell: bash
        run: node scripts/configure-release-build.mjs "$GITHUB_REPOSITORY" "${WINDOWS_CERTIFICATE_THUMBPRINT:-}"
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: v__VERSION__
          releaseName: Packager v__VERSION__
          releaseBody: Desktop installers and standalone CLI downloads are attached below.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            platform: darwin-arm64
            executable: packager
            archive: tar
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            platform: darwin-x64
            executable: packager
            archive: tar
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            platform: win32-x64
            executable: packager.exe
            archive: zip
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            platform: win32-arm64
            executable: packager.exe
            archive: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - run: cargo build --release -p packager-cli --target ${{ matrix.target }}
      - name: Stage native CLI
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.executable }}" "dist/${{ matrix.executable }}"
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "${{ matrix.archive }}" = tar ]; then
            tar -C dist -czf "$PWD/dist/packager-cli-v${VERSION}-${{ matrix.platform }}.tar.gz" packager
          else
            (cd dist && 7z a "packager-cli-v${VERSION}-${{ matrix.platform }}.zip" packager.exe)
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

  publish-cli:
    needs: [desktop, cli]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@v8
        with:
          pattern: cli-*
          path: artifacts
      - name: Verify npm publishing secret
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: test -n "$NPM_TOKEN"
      - name: Stage npm packages and release manifests
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node scripts/prepare-npm-release.mjs "$VERSION" "$GITHUB_REPOSITORY"
          install -Dm755 artifacts/cli-darwin-arm64/packager npm/packager-cli-darwin-arm64/bin/packager
          install -Dm755 artifacts/cli-darwin-x64/packager npm/packager-cli-darwin-x64/bin/packager
          install -Dm755 artifacts/cli-win32-arm64/packager.exe npm/packager-cli-win32-arm64/bin/packager.exe
          install -Dm755 artifacts/cli-win32-x64/packager.exe npm/packager-cli-win32-x64/bin/packager.exe
          node scripts/generate-package-manager-manifests.mjs "$GITHUB_REPOSITORY" "$VERSION" artifacts
      - name: Publish architecture packages, then launcher
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for package in npm/packager-cli-darwin-arm64 npm/packager-cli-darwin-x64 npm/packager-cli-win32-arm64 npm/packager-cli-win32-x64; do
            npm publish --access public "./$package"
          done
          npm publish --access public ./npm/packager-cli
      - name: Upload standalone CLI and package-manager manifests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print0 | xargs -0 gh release upload "$GITHUB_REF_NAME" --clobber
          gh release upload "$GITHUB_REF_NAME" artifacts/packager.rb artifacts/packager.json artifacts/SHA256SUMS --clobber
