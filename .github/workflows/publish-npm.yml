name: Publish npm CLI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Source and npm version to publish
        required: true
        default: 0.1.0
        type: string

permissions:
  contents: read

concurrency:
  group: npm-publish-${{ github.event.release.tag_name || inputs.version }}
  cancel-in-progress: false

jobs:
  resolve:
    if: github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve npm version
        id: version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = release ]; then
            case "$RELEASE_TAG" in
              v*) VERSION="${RELEASE_TAG#v}" ;;
              *) echo "Stable release tags must start with v." >&2; exit 1 ;;
            esac
          else
            VERSION="$INPUT_VERSION"
          fi

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid npm version: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            platform: darwin-arm64
            executable: packager
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            platform: darwin-x64
            executable: packager
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            platform: win32-x64
            executable: packager.exe
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            platform: win32-arm64
            executable: packager.exe
    runs-on: ${{ matrix.runner }}
    env:
      VERSION: ${{ needs.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - run: node scripts/check-versions.mjs "$VERSION"
      - run: cargo build --locked --release -p packager-cli --target ${{ matrix.target }}
      - name: Verify and stage native CLI
        shell: bash
        run: |
          binary="target/${{ matrix.target }}/release/${{ matrix.executable }}"
          test "$("$binary" --version)" = "packager $VERSION"
          mkdir -p dist
          cp "$binary" "dist/${{ matrix.executable }}"
      - uses: actions/upload-artifact@v7
        with:
          name: npm-cli-${{ matrix.platform }}
          path: dist/${{ matrix.executable }}
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: [resolve, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      VERSION: ${{ needs.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install --global npm@12.0.1
      - uses: actions/download-artifact@v8
        with:
          pattern: npm-cli-*
          path: artifacts
      - name: Stage native npm packages
        run: |
          node scripts/check-versions.mjs "$VERSION"
          node scripts/prepare-npm-release.mjs "$VERSION" "$GITHUB_REPOSITORY"
          install -Dm755 artifacts/npm-cli-darwin-arm64/packager npm/packager-cli-darwin-arm64/bin/packager
          install -Dm755 artifacts/npm-cli-darwin-x64/packager npm/packager-cli-darwin-x64/bin/packager
          install -Dm755 artifacts/npm-cli-win32-arm64/packager.exe npm/packager-cli-win32-arm64/bin/packager.exe
          install -Dm755 artifacts/npm-cli-win32-x64/packager.exe npm/packager-cli-win32-x64/bin/packager.exe
          node --check npm/packager-cli/bin/packager.js
          for package in npm/packager-cli-darwin-arm64 npm/packager-cli-darwin-x64 npm/packager-cli-win32-arm64 npm/packager-cli-win32-x64 npm/packager-cli; do
            npm pack --dry-run "./$package" >/dev/null
          done
      - name: Publish architecture packages, then launcher
        run: |
          publish_package() {
            package_path="$1"
            package_name=$(node -p "require('./${package_path}/package.json').name")
            package_version=$(node -p "require('./${package_path}/package.json').version")
            if test "$(npm view --prefer-online "${package_name}@${package_version}" version 2>/dev/null || true)" = "${package_version}"; then
              echo "${package_name}@${package_version} is already published; skipping."
              return
            fi
            if npm publish --access public --provenance "./${package_path}"; then
              return
            fi

            echo "Publish returned an error; checking for a delayed registry write."
            for attempt in $(seq 1 60); do
              if test "$(npm view --prefer-online "${package_name}@${package_version}" version 2>/dev/null || true)" = "${package_version}"; then
                echo "${package_name}@${package_version} is present in the registry."
                return
              fi
              echo "Waiting for npm registry propagation (attempt ${attempt}/60)."
              sleep 10
            done
            return 1
          }

          for package in npm/packager-cli-darwin-arm64 npm/packager-cli-darwin-x64 npm/packager-cli-win32-arm64 npm/packager-cli-win32-x64; do
            publish_package "$package"
          done
          publish_package npm/packager-cli
      - name: Verify registry metadata
        run: |
          packages="npm/packager-cli-darwin-arm64 npm/packager-cli-darwin-x64 npm/packager-cli-win32-arm64 npm/packager-cli-win32-x64 npm/packager-cli"
          for attempt in $(seq 1 60); do
            all_ready=true
            for package_path in $packages; do
              package_name=$(node -p "require('./${package_path}/package.json').name")
              if test "$(npm view --prefer-online "${package_name}@${VERSION}" version 2>/dev/null || true)" != "${VERSION}"; then
                all_ready=false
              fi
            done
            if $all_ready; then
              break
            fi
            if test "$attempt" = 60; then
              echo "npm registry did not expose every package within 10 minutes." >&2
              exit 1
            fi
            echo "Waiting for npm registry propagation (attempt ${attempt}/60)."
            sleep 10
          done
          for package_path in $packages; do
            package_name=$(node -p "require('./${package_path}/package.json').name")
            test "$(npm view --prefer-online "${package_name}@${VERSION}" repository.url)" = "git+https://github.com/${GITHUB_REPOSITORY}.git"
          done

  verify-install:
    needs: [resolve, publish]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
          - runner: macos-15-intel
          - runner: windows-latest
          - runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    env:
      VERSION: ${{ needs.resolve.outputs.version }}
    steps:
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Install published CLI
        shell: bash
        run: npm install --global --no-audit --no-fund "@what256/packager@${VERSION}"
      - name: Verify published CLI
        shell: bash
        run: |
          test "$(packager --version)" = "packager $VERSION"
          packager --help >/dev/null
